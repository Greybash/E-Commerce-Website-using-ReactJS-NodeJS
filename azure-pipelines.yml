# Node.js with React
# Build a Node.js project that uses React.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/javascript

trigger:
- master

pool:
  name: 'prempool'

stages:
- stage: Clean_up 
  displayName: Cleaning the workspace
  condition: always()
  jobs:
  - job: cleanup
    workspace:
      clean: all
    steps:
    - script: echo "done cleaning the workspace"

- stage: Build
  displayName: Building Docker Image
  dependsOn: Clean_up
  jobs:
  - job: build
    steps:
    - checkout: self
      clean: true
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'

    - script: |
        cd frontend
        npm install
        npm run build
      displayName: 'Clean install and build'
        

