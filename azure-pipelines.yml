# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main 

pool:
  name: 'prempool'
  demands:
    - docker
    - trivy

variables:
- name: IMAGE_NAME1
  value: "backend"

- name: IMAGE_NAME2
  value: "frontend"

- name: DOCKERHUB_REPO
  value: "greybash/e-commerce-website"

- name: BUILD_TAG
  value: $(Build.BuildNumber)

- group: Dockerhub_creds   

stages:
- stage: Clean_up 
  displayName: Cleaning the workspace
  condition: always()
  jobs:
  - job: cleanup
    workspace:
      clean: all
    steps:
    - script: echo "done cleaning the workspace"

- stage: Docker_Cleanup
  displayName: Docker Cleanup Stage
  condition: always()
  jobs:
  - job: cleanup_docker
    displayName: Cleanup Docker Resources
    steps:
    - script: |
        echo "Stopping all containers..."
        docker stop $(docker ps -aq) || true

        echo "Removing all containers..."
        docker rm $(docker ps -aq) || true

        echo "Removing all images..."
        docker rmi -f $(docker images -aq) || true

        echo "Pruning volumes..."
        docker volume prune -f

        echo "Docker cleanup completed"
      displayName: Full Docker Cleanup

- stage: Build
  displayName: Building Docker Image
  dependsOn: Docker_Cleanup
  jobs:
  - job: build
    steps:
    - checkout: self
      clean: true
    - script: |
        ls -la
        
        docker build -t $(IMAGE_NAME1):$(BUILD_TAG) -f Dockerbackend . --no-cache
        docker build -t $(IMAGE_NAME2):$(BUILD_TAG) -f Dockerfrontend . --no-cache

- stage: Scan
  displayName: Scanning Image
  dependsOn: Build
  jobs:
  - job: scan
    steps:
    - script: |
        trivy image \
          --scanners vuln \
          --format template \
          --template "@/home/prempool/.trivy/templates/html.tpl" \
          -o trivy-report1.html \
          $(IMAGE_NAME1):$(BUILD_TAG)
        trivy image \
          --scanners vuln \
          --format template \
          --template "@/home/prempool/.trivy/templates/html.tpl" \
          -o trivy-report2.html \
          $(IMAGE_NAME2):$(BUILD_TAG)

    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: 'trivy-report1.html'
        artifact: 'trivy-report1'
    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: 'trivy-report2.html'
        artifact: 'trivy-report2'


- stage: Push
  displayName: Push Image to DockerHub
  dependsOn: Scan
  jobs:
  - job: push
    steps:
    - script: |
        echo $(pass) | docker login -u $(username) --password-stdin
      displayName: Docker Login

    - script: |
        docker tag $(IMAGE_NAME1):$(BUILD_TAG) $(DOCKERHUB_REPO):$(IMAGE_NAME1)
        docker tag $(IMAGE_NAME1):$(BUILD_TAG) $(DOCKERHUB_REPO):$(IMAGE_NAME1)-$(BUILD_TAG)
        docker push $(DOCKERHUB_REPO):$(IMAGE_NAME1)
        docker push $(DOCKERHUB_REPO):$(IMAGE_NAME1)-$(BUILD_TAG)
        docker tag $(IMAGE_NAME2):$(BUILD_TAG) $(DOCKERHUB_REPO):$(IMAGE_NAME2)
        docker tag $(IMAGE_NAME2):$(BUILD_TAG) $(DOCKERHUB_REPO):$(IMAGE_NAME2)-$(BUILD_TAG)
        docker push $(DOCKERHUB_REPO):$(IMAGE_NAME2)
        docker push $(DOCKERHUB_REPO):$(IMAGE_NAME2)-$(BUILD_TAG)
        